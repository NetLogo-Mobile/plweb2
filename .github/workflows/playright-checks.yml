name: PR CI

on:
  pull_request:
    branches: [main, dev, feature/**]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  test:
    name: 🧪 Lint & TypeScript & Playwright
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run eslint

      - name: Run TypeScript type check
        run: npx vue-tsc --noEmit

      - name: Run static analysis
        run: node scripts/tests/static-analysis.mjs
        continue-on-error: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --config scripts/tests/playwright.config.ts
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: scripts/tests/reports/
          retention-days: 30

      - name: Upload static analysis report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-report
          path: scripts/tests/reports/static-analysis-report.json
          retention-days: 30
