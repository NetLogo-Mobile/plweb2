name: OpenCode Cloud Coding CI 

on:
  push:
    branches:
      - main
    paths:
      - 'prompt.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  agent-coding:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            echo "Detected package-lock.json, installing with npm ci..."
            npm ci
          elif [ -f "yarn.lock" ]; then
            echo "Detected yarn.lock, installing with yarn..."
            yarn install --frozen-lockfile
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "Detected pnpm-lock.yaml, installing with pnpm..."
            npm install -g pnpm
            pnpm install --frozen-lockfile
          else
            echo "No lockfile detected, fallback to npm install..."
            npm install
          fi

      - name: Install OpenCode CLI
        run: |
          npm install -g opencode-ai

      - name: Sync Global Skills to Cloud Runner
        run: |
          if [ -d ".github/skills" ]; then
            echo "Syncing global skills from .github/skills to Runner config..."
            mkdir -p ~/.config/opencode/skills
            cp -r .github/skills/* ~/.config/opencode/skills/
          else
            echo "No virtual global skills folder found, proceeding with project-level skills only."
          fi

      - name: Extract Prompt from YAML
        id: extract_prompt
        run: |
          npm install js-yaml
          node -e "
            const fs = require('fs');
            const yaml = require('js-yaml');
            try {
              const doc = yaml.load(fs.readFileSync('prompt.yml', 'utf8'));
              if (!doc || !doc.prompt) {
                console.error('Error: prompt.yml 中未找到 prompt 字段');
                process.exit(1);
              }
              fs.writeFileSync('extracted_prompt.txt', doc.prompt);
            } catch (e) {
              console.error('解析 YAML 失败:', e);
              process.exit(1);
            }
          "

      - name: Run OpenCode Coding Agent
        run: |
          PROMPT=$(cat extracted_prompt.txt)
          # --dangerously-skip-permissions 会允许 OpenCode 自由调用刚才安装的 npm test 等指令
          opencode run \
            --model opencode/deepseek-v4-flash-free \
            --dangerously-skip-permissions \
            "$PROMPT"

      - name: Create Branch and Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f extracted_prompt.txt
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            echo "检测到代码变动，准备创建 PR..."
            BRANCH_NAME="opencode/patch-${{ github.run_id }}"
            git checkout -b "$BRANCH_NAME"
            git add .
            git commit -m "Auto-coding: OpenCode update based on prompt"
            git push origin "$BRANCH_NAME"
            
            gh pr create \
              --title "🤖 OpenCode Auto-coding: Update based on prompt.yml" \
              --body "This Pull Request was automatically generated by the OpenCode AI Agent running DeepSeek V4 Flash. Please review the changes before merging." \
              --head "$BRANCH_NAME" \
              --base "${{ github.ref_name }}"
          else
            echo "OpenCode 未对代码做出任何修改，无需创建 PR。"
          fi
